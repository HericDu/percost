<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bg)" />
  <!-- 内层玻璃高光 -->
  <rect x="8" y="8" width="112" height="56" rx="24" ry="24" fill="white" opacity="0.12" />
  <!-- ¥ 符号 -->
  <text x="64" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="white" letter-spacing="-1">¥</text>
  <!-- 装饰点 -->
  <circle cx="38" cy="40" r="4" fill="white" opacity="0.3" />
  <circle cx="90" cy="40" r="3" fill="white" opacity="0.2" />
  <circle cx="64" cy="100" r="3.5" fill="white" opacity="0.25" />
</svg>
